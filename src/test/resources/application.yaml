spring:
  application:
    name: routex-hub-driver-service

  threads:
    virtual:
      enabled: true

  kafka:
    # K8s: set KAFKA_BOOTSTRAP_SERVERS = kafka:9092 (hoặc service của bạn)
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true

    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:driver-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "vn.com.*"

  datasource:
    url: jdbc:h2:mem:driver_service_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:admin}
      password: ${SPRING_SECURITY_USER_PASSWORD:admin}

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

ibm:
  mq:
    host: ${IBM_MQ_HOST:localhost}
    port: ${IBM_MQ_PORT:1414}
    user: ${IBM_MQ_USER:app}
    password: ${IBM_MQ_PASSWORD:}
    channel: ${IBM_MQ_CHANNEL:SMARTPAY.OMNI.APP}
    queueManager: ${IBM_MQ_QUEUE_MANAGER:smartpay}
    concurrency: ${IBM_MQ_CONCURRENCY:12-60}

jms:
  thread:
    receive:
      timeout-seconds: ${JMS_THREAD_RECEIVE_TIMEOUT_SECONDS:30}
    send:
      timeout-seconds: ${JMS_THREAD_SEND_TIMEOUT_SECONDS:5}
  receive:
    timeout: ${JMS_RECEIVE_TIMEOUT:30000}
  caching:
    session-cache-size: ${JMS_CACHING_SESSION_CACHE_SIZE:256}
  time-to-live-milliseconds: ${JMS_TIME_TO_LIVE_MILLISECONDS:20000}
  recovery-interval: ${JMS_RECOVERY_INTERVAL:5000}
  max-message: ${JMS_MAX_MESSAGE:1}

server:
  port: ${SERVER_PORT:8888}

logging:
  level:
    org.springframework.security: DEBUG

identity:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    issuer: test
    audience: test
    authority-claim-name: roles
    authority-prefix: ROLE_
